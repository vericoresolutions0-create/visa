<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Defense-in-depth CSP for any static host that doesn't apply the
         vercel.json headers. frame-ancestors/X-Frame-Options and
         Cross-Origin-Opener-Policy can't be set via meta tag per spec, so
         those rely on the real HTTP header (vercel.json / vite.config.ts)
         instead. Trusted Types CAN be set via meta tag, so it's included
         here too — see src/lib/trusted-types.ts for the matching policy. -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self' https://challenges.cloudflare.com; style-src 'self' 'unsafe-inline'; font-src 'self'; img-src 'self' data: blob: https:; connect-src 'self' https://*.convex.cloud wss://*.convex.cloud https://*.convex.site https://challenges.cloudflare.com; frame-src https://challenges.cloudflare.com; object-src 'none'; base-uri 'self'; form-action 'self'; require-trusted-types-for 'script'; trusted-types default; upgrade-insecure-requests"
    />

    <title>VisaClear by Vericore — Precise Visa Document Checklists</title>
    <meta
      name="description"
      content="Stop getting your visa rejected. Get a precise, personalised visa document checklist in 60 seconds. Built for African, Asian, and LatAm applicants. Rejection analysis, deadline reminders, and verified immigration agents."
    />
    <meta name="author" content="Vericore Ltd" />
    <meta
      name="keywords"
      content="visa checklist, UK visa documents, Schengen visa, Canada visa, immigration, visa refusal, visa rejection analysis, Nigerian visa, African visa applicants"
    />
    <meta name="robots" content="index, follow" />
    <link rel="sitemap" type="application/xml" href="/sitemap.xml" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/icon/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon/icon-192.png" />

    <!-- Open Graph — per-page values are overridden by useSeo() after JS loads -->
    <meta
      property="og:title"
      content="VisaClear by Vericore — Precise Visa Document Checklists"
    />
    <meta
      property="og:description"
      content="Stop getting your visa rejected. Precise, personalised visa document checklists for African, Asian, and LatAm applicants."
    />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://visaclear.app" />
    <meta property="og:image" content="/og-image.png" />
    <meta property="og:image:type" content="image/png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="VisaClear by Vericore" />
    <meta property="og:locale" content="en_GB" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VisaClear — Precise Visa Checklists" />
    <meta
      name="twitter:description"
      content="60-second personalised visa checklists for African, Asian & LatAm applicants. Built with GDPR & NDPA Principles."
    />
    <meta name="twitter:image" content="/og-image.png" />

    <!-- Prevent white flash on iOS PWA launch: sets the app background before
         external CSS loads so the user sees navy instead of a white blink. -->
    <style>html,body{background:#0f2040}</style>

    <!-- PWA -->
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="theme-color" content="#0f2040" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta
      name="apple-mobile-web-app-status-bar-style"
      content="black-translucent"
    />
    <meta name="apple-mobile-web-app-title" content="VisaClear" />
    <meta name="mobile-web-app-capable" content="yes" />

    <!-- iOS PWA splash screens — one image per device class (portrait).
         Without these iOS shows a white screen during the ~300 ms before
         the first render; with them it shows the branded navy splash. -->
    <link rel="apple-touch-startup-image" href="/splash/splash-640x1136.png"
      media="(device-width:320px) and (device-height:568px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-750x1334.png"
      media="(device-width:375px) and (device-height:667px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1242x2208.png"
      media="(device-width:414px) and (device-height:736px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1125x2436.png"
      media="(device-width:375px) and (device-height:812px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-828x1792.png"
      media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1242x2688.png"
      media="(device-width:414px) and (device-height:896px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1170x2532.png"
      media="(device-width:390px) and (device-height:844px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1179x2556.png"
      media="(device-width:393px) and (device-height:852px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1284x2778.png"
      media="(device-width:428px) and (device-height:926px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1290x2796.png"
      media="(device-width:430px) and (device-height:932px) and (-webkit-device-pixel-ratio:3) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1536x2048.png"
      media="(device-width:768px) and (device-height:1024px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-1668x2388.png"
      media="(device-width:834px) and (device-height:1194px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">
    <link rel="apple-touch-startup-image" href="/splash/splash-2048x2732.png"
      media="(device-width:1024px) and (device-height:1366px) and (-webkit-device-pixel-ratio:2) and (orientation:portrait)">

    <!-- Structured Data -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "VisaClear by Vericore",
        "description": "Precise, personalised visa document checklists for African, Asian, and LatAm applicants.",
        "url": "https://visaclear.app",
        "applicationCategory": "TravelApplication",
        "operatingSystem": "Web",
        "offers": {
          "@type": "Offer",
          "price": "0",
          "priceCurrency": "GBP"
        },
        "author": {
          "@type": "Organization",
          "name": "Vericore Ltd"
        }
      }
    </script>

    <!-- Fonts (Inter + Cormorant Garamond) are self-hosted via @fontsource,
         imported in index.css — no external font host, no preconnect needed. -->

    <!-- Detect dark mode preference before next-themes loads to avoid a flash of unstyled content. External file avoids unsafe-inline in CSP. -->
    <script src="/theme-init.js"></script>

    <link href="/src/index.css" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
